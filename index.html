    --text-dim: #555;
    --border: rgba(255,255,255,0.07);
    --card: #141414;
    --radius: 16px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* \u2500\u2500\u2500 SCROLLBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 4px; }

  /* \u2500\u2500\u2500 LOADER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  #loader {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #loader.hidden { opacity: 0; visibility: hidden; }

  .loader-name {
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #fff;
    margin-bottom: 3rem;
    animation: namePulse 1.5s ease infinite alternate;
  }
  .loader-name span { color: var(--accent); }

  @keyframes namePulse {
    from { opacity: 0.8; text-shadow: none; }
    to   { opacity: 1; text-shadow: 0 0 30px rgba(0,255,136,0.5); }
  }

  /* Timeline bar */
  .timeline-wrap {
    width: min(480px, 85vw);
    position: relative;
  }
  .timeline-bar {
    width: 100%;
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    position: relative;
    overflow: visible;
  }
  .timeline-track {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    animation: trackFill 2.4s cubic-bezier(0.4,0,0.2,1) forwards;
    box-shadow: 0 0 8px rgba(0,255,136,0.5);
  }
  @keyframes trackFill { to { width: 100%; } }

  .playhead {
    position: absolute;
    top: -20px;
    left: 0%;
    display: flex; flex-direction: column; align-items: center;
    animation: playheadMove 2.4s cubic-bezier(0.4,0,0.2,1) forwards;
    filter: drop-shadow(0 0 6px var(--accent));
  }
